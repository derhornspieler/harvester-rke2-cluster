  # ---------------------------------------------------------------------------
  # SAST — Semgrep
  # ---------------------------------------------------------------------------
  semgrep:
    name: SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Semgrep scan
        run: semgrep scan --config auto --error --exclude 'deploy-terraform' --exclude 'operators/upstream' .
        env:
          SEMGREP_RULES: auto
