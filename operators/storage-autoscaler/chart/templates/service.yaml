apiVersion: v1
kind: Service
metadata:
  name: storage-autoscaler-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "storage-autoscaler.labels" . | nindent 4 }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: {{ .Values.service.port | quote }}
spec:
  type: ClusterIP
  selector:
    {{- include "storage-autoscaler.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.service.port }}
      targetPort: metrics
      protocol: TCP
