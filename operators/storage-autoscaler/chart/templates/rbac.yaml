apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: storage-autoscaler
  labels:
    {{- include "storage-autoscaler.labels" . | nindent 4 }}
rules:
  - apiGroups: ["autoscaling.volume-autoscaler.io"]
    resources: ["volumeautoscalers"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["autoscaling.volume-autoscaler.io"]
    resources: ["volumeautoscalers/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["autoscaling.volume-autoscaler.io"]
    resources: ["volumeautoscalers/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: storage-autoscaler
  labels:
    {{- include "storage-autoscaler.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: storage-autoscaler
subjects:
  - kind: ServiceAccount
    name: storage-autoscaler
    namespace: {{ .Release.Namespace }}
