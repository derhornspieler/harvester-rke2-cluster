# Default values for storage-autoscaler.
# All values are overridable via --set / values.yaml.
image:
  repository: harbor.example.com/library/storage-autoscaler
  tag: v0.7.0
  pullPolicy: IfNotPresent

replicaCount: 3

nodeSelector:
  workload-type: general

tolerations:
  - key: node.kubernetes.io/not-ready
    operator: Exists
    effect: NoExecute
    tolerationSeconds: 60

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

service:
  port: 8080

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  scaleUpStabilizationSeconds: 60
  scaleDownStabilizationSeconds: 300
