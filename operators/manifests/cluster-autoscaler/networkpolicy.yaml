apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: cluster-autoscaler
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow metrics scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8085
          protocol: TCP
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow kube-apiserver access (for node/pod inspection).
    # Omit 'to:' so Cilium allows both cluster-internal (service/pod IPs)
    # and external destinations. Using ipBlock 0.0.0.0/0 with Cilium only
    # matches reserved:world (external), not cluster-internal traffic.
    - ports:
        - port: 6443
          protocol: TCP
    # Allow Rancher API access (port 443 for scaling machine pools) and
    # kube-apiserver ClusterIP service (10.43.0.1:443 -> pod:6443).
    - ports:
        - port: 443
          protocol: TCP
