apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: redis-operator
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow metrics scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
          protocol: TCP
    # Allow health checks from within namespace
    - from:
        - podSelector: {}
      ports:
        - port: 8081
          protocol: TCP
  egress:
    # Allow DNS resolution (kube-dns only)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow kube-apiserver access (RKE2 default service CIDR)
    - to:
        - ipBlock:
            cidr: 10.43.0.1/32
      ports:
        - port: 6443
          protocol: TCP
