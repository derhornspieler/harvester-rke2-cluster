---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis-operator
  namespace: redis-operator
  labels:
    app.kubernetes.io/name: redis-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: redis-operator
  labels:
    app.kubernetes.io/name: redis-operator
rules:
  # Core resources for managing Redis workloads
  - apiGroups: [""]
    resources:
      - configmaps
      - events
      - namespaces
      - persistentvolumeclaims
      - pods
      - pods/exec
      - secrets
      - services
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  # CRD discovery
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  # StatefulSet management for Redis instances
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  # PodDisruptionBudget management
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  # Redis CRD resources
  - apiGroups: ["redis.redis.opstreelabs.in"]
    resources:
      - redis
      - redisclusters
      - redisreplications
      - redissentinels
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  # Redis CRD finalizers
  - apiGroups: ["redis.redis.opstreelabs.in"]
    resources:
      - redis/finalizers
      - redisclusters/finalizers
      - redisreplications/finalizers
      - redissentinels/finalizers
    verbs: ["update"]
  # Redis CRD status
  - apiGroups: ["redis.redis.opstreelabs.in"]
    resources:
      - redis/status
      - redisclusters/status
      - redisreplications/status
      - redissentinels/status
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: redis-operator
  labels:
    app.kubernetes.io/name: redis-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: redis-operator
subjects:
  - kind: ServiceAccount
    name: redis-operator
    namespace: redis-operator
