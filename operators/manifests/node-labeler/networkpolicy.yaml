apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: node-labeler
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow metrics scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
          protocol: TCP
    # Allow health checks from within namespace
    - from:
        - podSelector: {}
      ports:
        - port: 8081
          protocol: TCP
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow kube-apiserver access (service ClusterIP:443 and pod:6443).
    # Omit 'to:' because Cilium's ipBlock 0.0.0.0/0 only matches
    # reserved:world (external), not cluster-internal service/pod IPs.
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
